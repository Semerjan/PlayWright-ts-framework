# ──────────────────────────────────────────────────────────────────────────────
# Clearight CI Pipeline
# Triggers on: push to main / develop
# Runs: Full UI (Chromium) + API test suite, uploads reports as artifacts
# ──────────────────────────────────────────────────────────────────────────────

name: Clearight CI

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:          # Allow manual runs from GitHub UI

env:
  NODE_VERSION: '20'

jobs:
  # ── API Tests ──────────────────────────────────────────────────────────────
  api-tests:
    name: 'API Tests (ReqRes)'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (no browsers needed for API)
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npx playwright test --project=api --reporter=list,junit
        env:
          CI: true
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://reqres.in' }}

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            test-results/junit.xml
            playwright-report/
          retention-days: 14

  # ── UI Tests ───────────────────────────────────────────────────────────────
  ui-tests:
    name: 'UI Tests (Chromium)'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npx playwright test --project=ui-chromium --reporter=list,html,junit
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          SAUCE_STANDARD_USER: ${{ secrets.SAUCE_STANDARD_USER || 'standard_user' }}
          SAUCE_LOCKED_USER:   ${{ secrets.SAUCE_LOCKED_USER   || 'locked_out_user' }}
          SAUCE_PASSWORD:      ${{ secrets.SAUCE_PASSWORD       || 'secret_sauce' }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-html-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces & videos (failures only)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-failure-traces
          path: test-results/
          retention-days: 7

  # ── Report Summary ─────────────────────────────────────────────────────────
  report-summary:
    name: 'Test Report Summary'
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: api-test-results
          path: api-results/
        continue-on-error: true

      - name: Post job summary
        run: |
          echo "## 🧪 Clearight Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests   | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests    | ${{ needs.ui-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Full HTML report available in job artifacts." >> $GITHUB_STEP_SUMMARY
